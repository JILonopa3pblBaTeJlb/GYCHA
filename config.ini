[GLOBAL]
; Базовая рабочая директория проекта. Все относительные пути скриптов строятся от нее.
base_dir = .
; Файл для сохранения истории воспроизведения треков и рекламы (защищает от частых повторов).
history_file = history.json
; Имя файла шрифта, используемого для отрисовки всех текстов в FFmpeg и в консоли статуса.
font_main = Flexi_IBM_VGA_False_437.ttf
; Файл текстового буфера. status.py циклично пишет в него экран вещания, а FFmpeg читает и накладывает его на видео.
log_buffer_file = fakelogs.txt

[PATHS]
; История загруженного  
downloaded_history = downloaded.json
; Файл со стоп-словами для цензуры сообщений от слушателей в Telegram.
blacklist_file = blacklistedwords.txt
; Словарь существительных для генерации случайных шифровок радиостанции УВБ-76 (uvb.py).
nouns_file = nouns_small.txt
; JSON-файл для хранения метаданных о фильмах (название, описание, год и т.д.).
vhs_metadata = vhs_metadata.json
; Файл, куда content.py пишет время старта и длительность текущего фильма для контроля таймингов.
vhs_length_file = length.txt
; Программа передач по умолчанию. Используется, если для конкретного дня недели нет файла programN.txt.
program_default = program.txt
; Папка с короткими видео (оверлеями), которые циклично крутятся на фоне радио-эфира.
pip_dir = pip
; Текстовый файл с описанием текущего фильма для отображения в правой панели (status.py).
movie_info_file = movie.txt
; Текстовый файл плейлиста, генерируемый 1h_pl.py для скармливания в FFmpeg через concat.
playlist_file = playlist.txt
; Служебный файл конкатенации видео-оверлеев из папки pip для concat-демультиплексора.
overlay_concat_file = overlay_concat.txt
; Файл для сохранения максимального зафиксированного курса Биткоина (finance.py).
btc_data_file = btc.txt
; Файл, куда messenger.py складывает текущую бегущую строку от слушателей.
broadcast_file = broadcast.txt
; Общий лог-файл системных событий (ошибки FFmpeg, статус загрузок и т.д.).
system_log = system.log
; Файл, куда пишется дата и время последнего полного сканирования папок в Telegram.
last_scan_log = last_scan.txt
; Статичное видео для функции "картинка в картинке" (PIP) во время VHS-сеансов.
pip_video = pip.mp4
; Фоновая картинка (обложка), которая стримится во время обычного радио-эфира.
cover_image = cover.png

[AIR_CONTROL]
; Минута часа, в которую запускается генерация нового плейлиста и подготовка к переключению.
switch_min = 59
; Секунда минуты, в которую происходит непосредственный "прыжок" на новый FFmpeg процесс.
switch_sec = 45
; Задержка (в секундах) между гашением старого процесса и стартом нового для освобождения порта/сокета.
socket_release_delay_sec = 0.2
; Таймаут (в секундах) "молчания" FFmpeg в stderr. Если вывода нет дольше - процесс считается зависшим и убивается.
hang_timeout_sec = 2
; Запас времени (в секундах) после формального окончания фильма. Только после этого скрипт переключится на радио.
vhs_overtime_buffer_sec = 1
; Час старта VHS-киносеанса (по умолчанию 20:00).
vhs_hour = 20
; Дни недели, когда активен кинотеатр (4-Пт, 5-Сб, 6-Вс).
vhs_days = 4,5,6

[CONTENT_MANAGER]
; Интервал (в часах) между полными сканированиями Telegram-каналов для обновления статистики.
scan_interval_h = 12
; Максимальный размер скачиваемого аудиофайла (в мегабайтах), чтобы не забить 4GB RAM VPS.
max_audio_size_mb = 56
; Максимальный размер скачиваемого фильма (в мегабайтах).
max_video_size_mb = 1900
; Время (в минутах) до начала фильма, за которое content.py пойдет скачивать его из ТГ.
vhs_preload_offset_min = 90
; Лимит времени (таймаут) на скачивание фильма в секундах (30 минут).
download_timeout_video_sec = 1800
; Лимит времени (таймаут) на скачивание аудиофайла в секундах (5 минут).
download_timeout_audio_sec = 300

[RECORDER]
; Юзернейм или ID канала в Telegram, куда рекордер (recorder.py) будет заливать часовые записи эфира.
target_channel = your_archive_channel_username
; Название аудиозаписи в метаданных Telegram (ID3-тег Title).
audio_title = Radio Archive
; Исполнитель аудиозаписи в метаданных Telegram (ID3-тег Artist).
audio_performer = Radio Station

[TELEGRAM_BOTS]
; API Токен бота для скачивания контента из закрытых или открытых ТГ-каналов (content.py).
content_bot_token = 1234567890:ABCdefGHIjklMNOpqrSTUvwxYZ-example
; API Токен бота для приема сообщений в бегущую строку (messenger.py).
messenger_bot_token = 0987654321:ZYXwvuTSRqponMLKjihGFEdcBA-example
; API ID вашего Telegram приложения (нужен для Telethon сессий).
api_id = 12345678
; API Hash вашего Telegram приложения (нужен для Telethon сессий).
api_hash = abcdef0123456789abcdef0123456789

[PROGRAM_DISPLAY_NAMES]
; Человекочитаемые маппинги папок жанров. Используются для красивого вывода в LINEUP (расписании).
phonk = Час фонка
raggatek = Час раггатека
dnb = Час дрындыбаса
hardbass = Час хардбаса
nudisco = Час нюдиско
techno = Час техно
dubtech = Час дабтека
hiphop = Час хип-хопа
randomshit = Час случайного дерьма
diy = Час самодельной музыки
reggae = Час регги
jazz = Час джаза
reading = Аудиокниги для сна
stellardrone = Час стеллардрон
downtempo = Час даунтемпо
trance = Вечер транса
pop = Час популярной музыки
program2 = Авторская программа
vhs_movie = ВИДЕОСАЛОН

[CHANNELS_MAPPING]
; Сопоставление папок жанров на ID каналов в Telegram. Скрипт content.py берет треки именно отсюда.
phonk = -1000000000001
raggatek = -1000000000002
dnb = -1000000000003
hardbass = -1000000000004
nudisco = -1000000000005
techno = -1000000000006
dubtech = -1000000000007
hiphop = -1000000000008
randomshit = -1000000000009
diy = -1000000000010
reggae = -1000000000011
jazz = -1000000000012
reading = -1000000000013
stellardrone = -1000000000014
downtempo = -1000000000015
vhs = -1000000000016
trance = -1000000000017
pop = -1000000000018

[FFMPEG_SETTINGS]
; Целевой битрейт видеопотока.
v_bitrate = 300k
; Максимально допустимый битрейт видеопотока (для динамических сцен).
v_maxrate = 500k
; Битрейт аудиопотока в формате AAC.
a_bitrate = 128k
; URL RTMP-сервера (например, nginx-rtmp), куда FFmpeg пушит готовый поток.
rtmp_url = rtmp://localhost:1935/live/stream
; Размер буфера кодировщика (рекомендуется держать х2 от maxrate).
v_bufsize = 1000k

[FFMPEG_TEMPLATES]
standard = ffmpeg -re -rw_timeout 15000000 -loglevel debug
	-loop 1 -i {cover_image}
	-f concat -safe 0 -stream_loop -1 -i {playlist}
	-f concat -safe 0 -i {overlay_concat}
	-filter_complex "[2:v]scale=-1:200[ovr];
	[ovr]drawbox=x=0:y=0:w=iw:h=ih:color=black@1.0:t=1[ovr_box];
	[0:v][ovr_box]overlay=W-w-10:H-h-80,
	drawtext=fontfile={font}:textfile={log_file}:reload=1:fontcolor=black:fontsize=18:x=12:y=12,
	drawtext=fontfile={font}:textfile={log_file}:reload=1:fontcolor=#00ff00:fontsize=18:x=10:y=10[vout]"
	-map "[vout]" -map 1:a
	-c:v libx264 -tune stillimage -preset ultrafast -pix_fmt yuv420p
	-b:v {v_bitrate} -maxrate {v_maxrate} -bufsize {v_bufsize}
	-c:a aac -b:a {a_bitrate} -ar 44100
	-af "aresample=async=1000:min_hard_comp=0.5:first_pts=0,apad=pad_dur=1"
	-flush_packets 1 -rtbufsize 8M -f flv -rtmp_live live {rtmp_url}
; Шаблон для VHS-киносеанса (с поддержкой PIP и бегущей строки)
vhs = ffmpeg -y -re -loglevel debug {ss_pos}
	-i {input}
	-stream_loop -1 -i {pip}
	-filter_complex "[1:v]scale=iw/2:ih/2[pip];
	[0:v][pip]overlay=W-w-50:H-h-50,
	drawtext=fontfile={font}:textfile={broadcast_file}:reload=1:fontcolor=black:fontsize=18:x=12:y=H-32,
	drawtext=fontfile={font}:textfile={broadcast_file}:reload=1:fontcolor=#00ff00:fontsize=18:x=10:y=H-34[vout];
	[0:a]aresample=44100:async=1[aout]"
	-map "[vout]" -map "[aout]"
	-c:v libx264 -preset ultrafast -pix_fmt yuv420p
	-c:a aac -b:a 128k -ar 44100 -ac 2
	-f flv {rtmp_url}

[MESSENGER]
; Максимальное количество строк, которое может занять одно сообщение в блоке "Дорогая редакция".
max_lines = 3
; Ограничение ширины строки в символах для удержания красивой верстки интерфейса.
max_width = 67
; Максимальная длина бегущей строки (в символах).
broadcast_max = 92
; Время жизни (в секундах) кеша черного списка слов в ОЗУ, чтобы не дергать диск каждую секунду.
blacklist_ttl_sec = 60

[WEATHER_CITIES]
; Список городов для мониторинга погоды (weather.py) в формате: Ключ = Название | Широта | Долгота.
haifa = Хайфа | 32.7940 | 34.9896
barcelona = Барселона | 41.3851 | 2.1734
berlin = Берлин | 52.5200 | 13.4050
tokyo = Токио | 35.6895 | 139.6917
reykjavik = Рейкьявик | 64.1355 | -21.8954

[RSS]
; Источники новостей. Разделитель | используется, чтобы не конфликтовать с запятыми в URL.
feeds = https://news.google.com/rss?hl=ru&gl=RU&ceid=RU:ru | https://news.google.com/rss?hl=en&gl=US&ceid=US:en
max_history_lines = 200

[DIAGNOSTICS]
; Интервал сбора данных vmstat в секундах.
vmstat_interval_sec = 300
; Интервал замера сетевых потерь и пингов через утилиту mtr.
mtr_interval_sec = 300
; Хост, до которого измеряется качество сети (обычно DNS Google).
mtr_target_host = 8.8.8.8

[FINANCE]
; К какой валюте запрашиваются крипто-курсы.
base_crypto = usd
; Массив фиатных валют для расчета кросс-курса.
target_fiats = eur,rub,ils

[WATCHDOG]
; URL на стрим в Twitch для отслеживания его падений дежурным ботом.
twitch_url = https://www.twitch.tv/your_channel_name
; Частота проверки стрима на работоспособность в секундах.
check_interval_sec = 600
; Временные файлы дежурного бота.
watchdog_token = last_token.txt
watchdog_url = last_url.txt
watchdog_msg_ids = last_msg_ids.txt

[GUI_STATUS]
; Частота обновления отрисовщика status.py.
refresh_rate_sec = 1
; Сдвиг для часов в секундах (компенсация задержки плеера).
clock_offset_sec = 7
; Высота (кол-во строк) "окна" прокрутки погоды.
weather_window_size = 8
; Интервалы обновления фоновых модулей в секундах.
interval_res_sec = 5
interval_uvb_sec = 120
interval_finance_sec = 900
interval_weather_sec = 3600
interval_rss_sec = 1200
interval_lineup_sec = 60
interval_diag_sec = 5

[VHS_CARD]
; Ширина строки для генерации текстовой карточки фильма
line_width = 34
